services:
  api:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_URL=postgresql+psycopg://postgres:postgres@db:5432/hive
      - REDIS_URL=redis://redis:6379/0
      - JWT_ISSUER=hiveapi
      # Local dev stack: ENV=dev enables the dev-only login shortcut (proof
      # verification is skipped only when ENV is dev/test AND signatures are
      # disabled). NEVER set ENV=dev in a real deployment.
      - ENV=dev
      # Local dev signing secret. Override via .env for anything you care about;
      # this default exists only so the local stack can issue tokens out of the box.
      - JWT_SIGNING_SECRET=${JWT_SIGNING_SECRET:-local-dev-signing-secret-not-for-production}
      - REQUEST_SIGNATURE_REQUIRED=false
      # Local dev admin password so HTTP Basic admin endpoints work locally.
      # Override via .env. Admin auth fails closed when this is unset.
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-local-dev-admin-password}
      - IDEMPOTENCY_TTL_SECONDS=600
      - MOVE_TICKET_TTL_SECONDS=90
      - LOGOUT_GRACE_SECONDS=30
      - SERVER_SWITCH_COOLDOWN_SECONDS=180
      - PROMETHEUS_METRICS=true
      - LOG_LEVEL=INFO
      - ORIGIN_SECRET=${ORIGIN_SECRET:-}
    volumes:
      - ../keys:/keys
      - ../app:/app/app
      - ../tests:/app/tests
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      # Local-only default credentials. The Postgres container is reachable only
      # on the dev machine; do NOT reuse this password for any hosted database.
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=hive
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    command: postgres -c shared_preload_libraries=pgcrypto

  redis:
    image: redis:latest
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - ORIGIN_SECRET=${ORIGIN_SECRET:-}
    depends_on:
      - api
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
